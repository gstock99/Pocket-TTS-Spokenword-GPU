tts_core:
  temperature: 0.7
  eos_threshold: -4.0
  frames_after_eos: 2
chunking:
  mode: sentence
  min_words: 5
  max_words: 50
pauses:
  base_durations:
    sentence_end: 500
    paragraph_break: 1000
    chapter_start: 2000
quality:
  lsd_steps: 2
  speed_variation: true
asr_quality_control:
  enabled: false
  threshold: 0.85
  max_retries: 3
  temp_decrement: 0.1
m4b:
  enabled: false
  normalization_type: peak
pause_injection:
  enabled: false
  punctuation_durations:
    .: 0.5
    '!': 0.3
    '?': 0.3
    ',': 0.1
    '...': 0.5
    --: 0.4
    ;: 0.15
    ':': 0.15
parallel:
  max_workers: 4
